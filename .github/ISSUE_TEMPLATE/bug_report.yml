name: Bug report
description: Report a reproducible defect in the technical foundation or future product modules.
title: 'fix: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thank you for providing enough context to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest steps necessary to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Node.js and pnpm versions.
    validations:
      required: true
